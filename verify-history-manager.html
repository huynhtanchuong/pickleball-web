<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HistoryManager Verification</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
      background: #f5f5f5;
    }
    h1 {
      color: #333;
      border-bottom: 3px solid #4CAF50;
      padding-bottom: 10px;
    }
    pre {
      background: white;
      padding: 15px;
      border-radius: 4px;
      border-left: 4px solid #4CAF50;
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <h1>🏓 HistoryManager Verification</h1>
  <pre id="output">Running verification tests...</pre>

  <script src="referee-game-state.js"></script>
  <script>
    // Capture console.log output
    const output = document.getElementById('output');
    const originalLog = console.log;
    console.log = function(...args) {
      originalLog.apply(console, args);
      output.textContent += args.join(' ') + '\n';
    };
  </script>
  <script src="verify-history-manager.js"></script>
</body>
</html>
