<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🥎 HTC Pickleball — Bảng Điểm Trực Tiếp</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* Role-switcher pill (Trọng Tài / Admin) on the public view header.
       Same look-and-feel as the admin page version, scoped to the public
       stylesheet variables so we don't depend on admin-mobile.css. */
    .role-switcher {
      display: inline-flex;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 2px;
      gap: 0;
    }
    .role-switcher button {
      padding: 4px 10px;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--text-dim);
      background: transparent;
      border: none;
      cursor: pointer;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      gap: 3px;
      white-space: nowrap;
      transition: background 0.15s, color 0.15s;
    }
    .role-switcher button:hover {
      color: #e5e7eb;
      background: rgba(255,255,255,0.06);
    }
    @media (max-width: 600px) {
      .role-switcher button { padding: 4px 7px; font-size: 0.66rem; gap: 2px; }
    }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <div class="header-brand">
        <img src="logo.png" alt="Pickleball Logo" class="header-logo" onerror="this.style.display='none'" />
        <div>
          <h1 class="header-title" data-i18n="siteTitle">HTC Pickleball</h1>
          <p class="header-sub" data-i18n="liveSub">Bảng Điểm Trực Tiếp</p>
        </div>
      </div>
      <div class="header-meta">
        <span id="realtime-indicator" class="pulse-dot" style="display:none;" title="Realtime"></span>
        <span id="status-bar" class="status-chip" style="display:none;"></span>
        <button onclick="location.reload()" class="header-link" style="background:transparent;border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;gap:4px;" title="Làm mới trang">
          <span>↺</span>
          <span style="font-size:0.75rem;">Reload</span>
        </button>
        <div class="role-switcher" title="Chuyển vai trò">
          <button onclick="switchRole('referee', 'admin.html')" title="Trọng tài">
            <svg viewBox="0 0 24 24" width="14" height="14" style="vertical-align:-2px;margin-right:4px;" aria-hidden="true">
              <rect x="2.5" y="11" width="5.5" height="3" rx="1" fill="#fbbf24" stroke="#7c2d12" stroke-width="0.8"/>
              <ellipse cx="14" cy="12.5" rx="6" ry="5.5" fill="#fbbf24" stroke="#7c2d12" stroke-width="0.8"/>
              <ellipse cx="14" cy="9.4" rx="2.2" ry="0.8" fill="#7c2d12"/>
              <circle cx="19" cy="8" r="1.3" fill="none" stroke="#7c2d12" stroke-width="0.9"/>
            </svg><span data-i18n="roleReferee">Trọng Tài</span>
          </button>
          <button onclick="switchRole('admin', 'admin.html')" title="Admin">
            <svg viewBox="0 0 24 24" width="14" height="14" style="vertical-align:-2px;margin-right:4px;" aria-hidden="true">
              <path d="M3 8l3.5 4 3-5L12 5l2.5 2 3 5L21 8l-1.5 10h-15z" fill="#fbbf24" stroke="#7c2d12" stroke-width="0.9" stroke-linejoin="round"/>
              <rect x="4.5" y="16" width="15" height="2.2" rx="0.4" fill="#7c2d12"/>
              <circle cx="12" cy="11" r="1.1" fill="#dc2626" stroke="#7c2d12" stroke-width="0.6"/>
            </svg><span data-i18n="roleAdmin">Admin</span>
          </button>
        </div>
      </div>
    </div>
  </header>

  <!-- Tournament Selector — minimal, just the dropdown -->
  <div class="public-tournament-row">
    <select id="public-tournament-select" onchange="switchPublicTournament(this.value)">
      <option value="" data-i18n="loading">Đang tải…</option>
    </select>
    <span id="public-tournament-status"></span>
  </div>

  <main class="scoreboard-main">

    <!-- FEATURED MATCH -->
    <section id="featured-section" style="display:none;">
      <div class="featured-label">
        <span class="live-badge" data-i18n="liveBadge">● TRỰC TIẾP</span>
        <span class="featured-title" data-i18n="featuredLabel">Trận Nổi Bật</span>
      </div>
      <div id="featured-match" class="featured-card"></div>
    </section>

    <!-- GROUP STAGE -->
    <section class="sb-section">
      <div class="section-header">
        <span class="section-icon">📋</span>
        <h2 class="section-title" data-i18n="groupStage">Vòng Bảng</h2>
      </div>
      <div id="match-list-group" class="match-grid">
        <p class="empty-state" data-i18n="loadingMatches">Đang tải trận đấu…</p>
      </div>
    </section>

    <!-- SEMIFINALS -->
    <section class="sb-section" id="section-semi" style="display:none;">
      <div class="section-header">
        <span class="section-icon">⚡</span>
        <h2 class="section-title" data-i18n="semifinals">Bán Kết</h2>
        <span class="section-badge semi" data-i18n="knockout">Loại Trực Tiếp</span>
      </div>
      <div id="match-list-semi" class="match-grid"></div>
    </section>

    <!-- FINAL -->
    <section class="sb-section" id="section-final" style="display:none;">
      <div class="section-header">
        <span class="section-icon">🏆</span>
        <h2 class="section-title" data-i18n="final">Chung Kết</h2>
        <span class="section-badge final" data-i18n="championship">Chung Kết</span>
      </div>
      <div id="match-list-final" class="match-grid"></div>
    </section>

    <!-- BRACKET -->
    <section class="sb-section" id="section-bracket">
      <div class="section-header">
        <span class="section-icon">🗂</span>
        <h2 class="section-title" data-i18n="bracket">Bracket</h2>
      </div>
      <div id="bracket-container"></div>
    </section>

    <!-- STANDINGS -->
    <section class="sb-section">
      <div class="section-header">
        <span class="section-icon">📊</span>
        <h2 class="section-title" data-i18n="standings">Bảng Xếp Hạng</h2>
      </div>
      <div id="standings-container">
        <p class="empty-state" data-i18n="loadingStandings">Đang tải bảng xếp hạng…</p>
      </div>
    </section>

    <!-- DEMO CONTROLS -->
    <section class="sb-section demo-section" id="demo-controls" style="display:none;">
      <p class="demo-note" data-i18n="demoNote">⚠️ Demo — dữ liệu lưu cục bộ.</p>
      <button class="btn btn-secondary" onclick="resetDemo()" data-i18n="resetDemo">↺ Reset Demo</button>
    </section>

  </main>

  <footer class="site-footer">
    <span><svg viewBox="0 0 24 24" width="14" height="14" style="vertical-align:-2px;" aria-hidden="true"><circle cx="12" cy="12" r="10.5" fill="#fde047" stroke="#a16207" stroke-width="0.7"/><circle cx="8" cy="8" r="1.4" fill="#a16207"/><circle cx="16" cy="8" r="1.4" fill="#a16207"/><circle cx="12" cy="13" r="1.4" fill="#a16207"/><circle cx="7" cy="15" r="1.1" fill="#a16207"/><circle cx="17" cy="15" r="1.1" fill="#a16207"/><circle cx="12" cy="18.2" r="1" fill="#a16207"/></svg> <span data-i18n="siteTitle">HTC Pickleball</span></span>
    <span class="footer-sep">·</span>
    <span data-i18n="footerSub">Bảng Điểm Trực Tiếp</span>
    <span class="footer-sep">·</span>
    <a href="#" onclick="exportBackup(); return false;" style="color:var(--text-dim);text-decoration:none;" data-i18n="backupLink">Backup Now</a>
    <span class="footer-sep">·</span>
    <label style="color:var(--text-dim);font-size:0.85rem;cursor:pointer;display:inline-flex;align-items:center;gap:6px;">
      <input type="checkbox" id="auto-backup-toggle" onchange="toggleAutoBackup(this.checked)" style="cursor:pointer;">
      <span data-i18n="autoBackupToggle">Auto BU</span>
    </label>
    <span class="footer-sep">·</span>
    <span class="lang-switcher">
      <button class="lang-btn lang-btn-active" data-lang="vi" onclick="setLang('vi')">🇻🇳 VI</button>
      <button class="lang-btn" data-lang="en" onclick="setLang('en')">🇬🇧 EN</button>
    </span>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="auth.js"></script>
  <script src="storage.js"></script>
  <script src="members.js"></script>
  <script src="pairing.js"></script>
  <script src="tournaments.js"></script>
  <script src="i18n.js"></script>
  <script src="app.js"></script>

</body>
</html>
