<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Referee Game State Tests</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 1200px;
      margin: 20px auto;
      padding: 20px;
      background-color: #f5f5f5;
    }
    h1 {
      color: #333;
    }
    #summary {
      padding: 20px;
      margin: 20px 0;
      border-radius: 8px;
      font-size: 18px;
    }
    .summary.success {
      background-color: #d4edda;
      color: #155724;
      border: 2px solid #c3e6cb;
    }
    .summary.failure {
      background-color: #f8d7da;
      color: #721c24;
      border: 2px solid #f5c6cb;
    }
    #results {
      margin-top: 20px;
    }
    .test-result {
      padding: 10px;
      margin: 5px 0;
      border-radius: 4px;
      font-family: monospace;
    }
    .test-pass {
      background-color: #d4edda;
      color: #155724;
    }
    .test-fail {
      background-color: #f8d7da;
      color: #721c24;
    }
  </style>
</head>
<body>
  <h1>Referee Game State Tests</h1>
  <div id="summary">Running tests...</div>
  <div id="results"></div>

  <script src="referee-game-state.js"></script>
  <script src="referee-game-state.test.js"></script>
</body>
</html>
