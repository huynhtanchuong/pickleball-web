<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>🏓 Quản Trị — Giải Pickleball</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="admin-mobile.css" />
</head>
<body>

  <!-- LOGIN -->
  <div class="login-wrap" id="login-screen">
    <div class="login-card">
      <img src="logo.png" alt="Pickleball Logo" style="width:80px;height:80px;margin:0 auto 12px;" onerror="this.style.display='none'" />
      <h1 data-i18n="adminTitle">Đăng Nhập Admin</h1>
      <p data-i18n="adminSub">Giải Pickleball</p>
      <div class="form-group">
        <label for="pw-input" data-i18n="passwordLabel">Mật khẩu</label>
        <input type="password" id="pw-input"
          data-i18n="passwordPlaceholder" data-i18n-attr="placeholder"
          placeholder="Nhập mật khẩu"
          onkeydown="if(event.key==='Enter') doLogin()"
          autocomplete="current-password" autofocus />
      </div>
      <button class="login-btn" onclick="doLogin()" data-i18n="signIn">Đăng Nhập</button>
      <div class="login-error" id="login-error"></div>
      <p style="margin-top:20px;font-size:0.75rem;">
        <a href="index.html" style="color:#64748b;" data-i18n="backToPublic">← Xem bảng điểm</a>
      </p>
    </div>
  </div>

  <!-- ADMIN PANEL -->
  <div id="admin-panel" style="display:none;">

    <div class="adm-header">
      <div class="adm-header-left">
        <img src="logo.png" alt="Pickleball Logo" style="width:32px;height:32px;" onerror="this.style.display='none'" />
        <div>
          <div class="adm-title" data-i18n="adminPanelTitle">Quản Trị</div>
          <div class="adm-sub" data-i18n="siteTitle">Giải Pickleball</div>
        </div>
      </div>
      <div class="adm-header-right">
        <span id="realtime-indicator" class="pulse" style="display:none;"></span>
        <span id="status-bar" class="status-chip">…</span>
        <a href="index.html" class="adm-btn-sm" data-i18n="viewPublic">👁 Xem</a>
      </div>
    </div>

    <!-- Group Stage -->
    <div class="adm-section">
      <div class="adm-section-title" data-i18n="groupStageSection">📋 Vòng Bảng</div>
      <div id="match-list-group"><p class="empty" data-i18n="loading">Đang tải…</p></div>
    </div>

    <!-- Semifinals -->
    <div class="adm-section">
      <div class="adm-section-title" data-i18n="semiSection">⚡ Bán Kết</div>
      <div id="match-list-semi"><p class="empty adm-auto-note" data-i18n="autoSemi">⏳ Tự động tạo khi vòng bảng xong.</p></div>
    </div>

    <!-- Final -->
    <div class="adm-section">
      <div class="adm-section-title" data-i18n="finalSection">🏆 Chung Kết</div>
      <div id="match-list-final"><p class="empty adm-auto-note" data-i18n="autoFinal">⏳ Tự động tạo khi bán kết xong.</p></div>
    </div>

    <!-- Bracket visual -->
    <div class="adm-section">
      <div class="adm-section-title" data-i18n="bracketVisual">🗂 Bracket</div>
      <div id="bracket-container"></div>
    </div>

    <!-- Standings -->
    <div class="adm-section">
      <div class="adm-section-title" data-i18n="standingsSection">📊 Bảng Xếp Hạng</div>
      <div id="standings-container"><p class="empty" data-i18n="loading">Đang tải…</p></div>
    </div>

    <!-- Language switcher at bottom -->
    <div class="adm-section" style="text-align:center;padding:12px 16px;">
      <div style="display:flex;align-items:center;justify-content:center;gap:16px;flex-wrap:wrap;margin-bottom:12px;">
        <a href="teams.html" style="font-size:0.8rem;color:var(--text-dim);text-decoration:none;padding:4px 12px;border:1px solid var(--border);border-radius:6px;">📋 Quản lý đội</a>
        <button onclick="doLogout()" style="font-size:0.8rem;color:#fca5a5;background:transparent;border:1px solid var(--border);border-radius:6px;padding:4px 12px;cursor:pointer;" data-i18n="logout">🚪 Đăng xuất</button>
      </div>
      <span class="lang-switcher">
        <button class="lang-btn lang-btn-active" data-lang="vi" onclick="setLang('vi')">🇻🇳 VI</button>
        <button class="lang-btn" data-lang="en" onclick="setLang('en')">🇬🇧 EN</button>
      </span>
      <br>
      <button class="adm-reset-all-link" onclick="resetDemo()">↺ Reset all data</button>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="i18n.js"></script>
  <script src="app.js"></script>
  <script src="admin.js"></script>

</body>
</html>
